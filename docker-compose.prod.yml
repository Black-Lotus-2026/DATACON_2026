services:
  datacon-web:
    expose:
      - "8000"
    ports: !reset []

  caddy:
    image: caddy:2-alpine
    depends_on:
      - datacon-web
    environment:
      SITE_ADDRESS: "${SITE_ADDRESS:-:80}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
